<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayBoard — Your Daily Dashboard</title>
<meta name="description" content="A beautiful daily dashboard. Weather, clock, to-do list, daily quote, and quick search. Set as your browser homepage.">
<meta name="robots" content="index, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: rgba(255,255,255,0.03);
  --surface-hover: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.06);
  --text: #e8ecf1;
  --text-secondary: #8892a4;
  --text-muted: #555d6e;
  --accent: #c4a35a;
  --accent-glow: rgba(196,163,90,0.2);
  --radius: 18px;
  --radius-sm: 10px;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; }
body {
  font-family: 'Outfit', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Background */
.bg-image {
  position: fixed; inset: 0; z-index: 0;
  background-size: cover; background-position: center;
  opacity: 0.15; transition: opacity 1s;
}
.bg-overlay {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(196,163,90,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(100,140,200,0.06) 0%, transparent 50%);
}

/* Layout */
.dashboard {
  position: relative; z-index: 1;
  width: 100%; max-width: 900px;
  min-height: 100vh;
  display: flex; flex-direction: column;
  justify-content: center;
  padding: 40px 32px;
}

/* Hero section: Time + Quote */
.hero-section {
  text-align: center;
  margin-bottom: 48px;
  animation: fadeUp 0.8s var(--ease) forwards;
}

.time-display {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(3.5rem, 10vw, 7rem);
  font-weight: 200;
  letter-spacing: -3px;
  color: var(--text);
  line-height: 1;
  margin-bottom: 4px;
}
.time-display .ampm {
  font-size: 0.35em;
  font-weight: 300;
  letter-spacing: 0;
  margin-left: 8px;
  color: var(--text-secondary);
}

.date-display {
  font-size: 1.15rem;
  color: var(--text-secondary);
  font-weight: 400;
  letter-spacing: 0.5px;
  margin-bottom: 24px;
}

.greeting {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.5rem, 3vw, 2.2rem);
  font-style: italic;
  color: var(--accent);
  font-weight: 400;
  margin-bottom: 8px;
}

.quote-text {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  color: var(--text-secondary);
  max-width: 500px;
  margin: 0 auto;
  line-height: 1.5;
  opacity: 0.7;
}

/* Weather */
.weather-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 8px;
  font-size: 0.9rem;
  color: var(--text-secondary);
}
.weather-icon { font-size: 1.5rem; }

/* Search */
.search-wrap {
  margin: 0 auto 48px;
  max-width: 560px;
  width: 100%;
  animation: fadeUp 0.8s var(--ease) 0.15s forwards;
  opacity: 0;
}
.search-box {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50px;
  overflow: hidden;
  backdrop-filter: blur(20px);
  transition: border-color 0.3s, box-shadow 0.3s;
}
.search-box:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 24px var(--accent-glow);
}
.search-engine {
  padding: 14px 8px 14px 18px;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  outline: none;
  min-width: 100px;
  border-right: 1px solid var(--border);
}
.search-engine option { background: #1a1d26; color: var(--text); }
.search-input {
  flex: 1;
  padding: 14px 18px;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 1rem;
  outline: none;
}
.search-input::placeholder { color: var(--text-muted); }
.search-btn {
  padding: 14px 22px;
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-size: 1.1rem;
  cursor: pointer;
  transition: color 0.2s;
}
.search-btn:hover { color: var(--accent); }

/* Bento Grid */
.bento-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 160px;
  gap: 12px;
  animation: fadeUp 0.8s var(--ease) 0.3s forwards;
  opacity: 0;
}

.bento-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  backdrop-filter: blur(20px);
  transition: all 0.3s var(--ease);
  overflow: hidden;
  position: relative;
}
.bento-card:hover {
  background: var(--surface-hover);
  border-color: rgba(255,255,255,0.12);
  transform: translateY(-2px);
}
.bento-card.col-2 { grid-column: span 2; }
.bento-card.row-2 { grid-row: span 2; }

.card-title {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  font-weight: 600;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-title .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
}

/* Todo card */
.todo-list { list-style: none; max-height: 80px; overflow-y: auto; }
.todo-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; font-size: 0.85rem; color: var(--text-secondary);
  cursor: pointer; transition: color 0.2s;
}
.todo-item:hover { color: var(--text); }
.todo-item.done { text-decoration: line-through; opacity: 0.4; }
.todo-check { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--text-muted); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; transition: all 0.2s; }
.todo-item.done .todo-check { background: var(--accent); border-color: var(--accent); }
.todo-input {
  width: 100%; padding: 6px 0; background: transparent; border: none; border-bottom: 1px solid var(--border);
  color: var(--text); font-family: 'Outfit', sans-serif; font-size: 0.8rem; outline: none; margin-top: 4px;
}
.todo-input::placeholder { color: var(--text-muted); }

/* Links card */
.quick-links { display: flex; flex-wrap: wrap; gap: 8px; }
.quick-link {
  padding: 6px 14px; border-radius: 20px;
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary); text-decoration: none;
  font-size: 0.8rem; transition: all 0.2s;
  border: 1px solid transparent;
}
.quick-link:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border); }

/* Countdown card */
.countdown-num {
  font-size: 2.5rem; font-weight: 300; letter-spacing: -1px;
  color: var(--accent); line-height: 1;
}
.countdown-label { font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px; }

/* Stats */
.stat-value {
  font-size: 2rem; font-weight: 500; letter-spacing: -1px;
  color: var(--text); line-height: 1;
}
.stat-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }

/* Focus button */
.focus-link {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 8px; padding: 8px 16px;
  background: var(--accent); color: #0d0f14;
  border-radius: 20px; text-decoration: none;
  font-size: 0.8rem; font-weight: 600;
  transition: all 0.2s;
}
.focus-link:hover { transform: scale(1.03); box-shadow: 0 0 20px var(--accent-glow); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
  .dashboard { padding: 32px 16px; }
  .bento-grid {
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 140px;
  }
  .bento-card.col-2 { grid-column: span 2; }
  .time-display { font-size: 3rem; }
}
@media (max-width: 480px) {
  .bento-grid { grid-template-columns: 1fr; grid-auto-rows: auto; }
  .bento-card.col-2 { grid-column: span 1; }
  .time-display { font-size: 2.5rem; }
}
</style>
</head>
<body>

<div class="bg-image" id="bgImage"></div>
<div class="bg-overlay"></div>

<div class="dashboard">

  <!-- Hero -->
  <div class="hero-section">
    <div class="greeting" id="greeting">Good morning</div>
    <div class="time-display" id="timeDisplay">00:00</div>
    <div class="date-display" id="dateDisplay"></div>
    <div class="weather-bar" id="weatherBar">Loading weather...</div>
    <div class="quote-text" id="quoteText"></div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <div class="search-box">
      <select class="search-engine" id="searchEngine">
        <option value="https://www.google.com/search?q=">🔍 Google</option>
        <option value="https://www.bing.com/search?q=">🔷 Bing</option>
        <option value="https://www.baidu.com/s?wd=">🔶 百度</option>
        <option value="https://search.bilibili.com/all?keyword=">📺 B站</option>
        <option value="https://www.youtube.com/results?search_query=">▶️ YouTube</option>
      </select>
      <input type="text" class="search-input" id="searchInput" placeholder="Search the web..." onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" onclick="doSearch()">→</button>
    </div>
  </div>

  <!-- Bento Grid -->
  <div class="bento-grid">

    <!-- Quick Links -->
    <div class="bento-card col-2">
      <div class="card-title"><span class="dot"></span> Quick Links</div>
      <div class="quick-links">
        <a href="#" class="quick-link" onclick="localStorage.setItem('db_links',prompt('Edit links (comma-separated URLs|names):',localStorage.getItem('db_links')||''));location.reload()">✏️ Edit</a>
        <span id="quickLinksContainer"></span>
      </div>
    </div>

    <!-- To-Do -->
    <div class="bento-card row-2">
      <div class="card-title"><span class="dot"></span> Today's Tasks</div>
      <ul class="todo-list" id="todoList"></ul>
      <input type="text" class="todo-input" id="todoInput" placeholder="+ Add task..." onkeydown="if(event.key==='Enter')addTodo()">
    </div>

    <!-- Year Progress -->
    <div class="bento-card">
      <div class="card-title"><span class="dot"></span> Year Progress</div>
      <div class="stat-value" id="yearPercent">0%</div>
      <div class="stat-label">2026 is flying by</div>
    </div>

    <!-- Countdown -->
    <div class="bento-card">
      <div class="card-title"><span class="dot"></span> Next Weekend</div>
      <div class="countdown-num" id="countdownDays">0</div>
      <div class="countdown-label">days until Friday</div>
    </div>

    <!-- Focus -->
    <div class="bento-card">
      <div class="card-title"><span class="dot"></span> Focus Mode</div>
      <div style="font-size:0.85rem;color:var(--text-secondary)">Start a deep work session</div>
      <a href="tools/focus-timer.html" class="focus-link">⏱️ Start Focus</a>
    </div>

  </div>

</div>

<script>
// ===== Clock =====
function updateClock() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  document.getElementById('timeDisplay').innerHTML = `${h12}:${String(m).padStart(2,'0')}<span class="ampm">${ampm}</span>`;
  
  // Greeting
  let g = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greeting').textContent = g;
  
  // Date
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('dateDisplay').textContent = now.toLocaleDateString('en-US', opts);
  
  // Year progress
  const start = new Date(now.getFullYear(), 0, 1);
  const end = new Date(now.getFullYear() + 1, 0, 1);
  const pct = ((now - start) / (end - start) * 100).toFixed(1);
  document.getElementById('yearPercent').textContent = pct + '%';
  
  // Countdown to Friday
  const dayOfWeek = now.getDay();
  const daysUntilFriday = dayOfWeek <= 5 ? 5 - dayOfWeek : 7 - dayOfWeek + 5;
  document.getElementById('countdownDays').textContent = daysUntilFriday || '🎉';
  if (daysUntilFriday === 0) {
    document.querySelector('#countdownDays').nextElementSibling.textContent = "It's Friday! 🎉";
  }
}
updateClock();
setInterval(updateClock, 10000);

// ===== Weather (Open-Meteo free API) =====
async function fetchWeather() {
  try {
    // Try to get location
    const pos = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
    });
    const { latitude: lat, longitude: lon } = pos.coords;
    const resp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`);
    const data = await resp.json();
    const temp = Math.round(data.current.temperature_2m);
    const code = data.current.weather_code;
    const icons = { 0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',61:'🌧️',71:'🌨️',80:'🌦️',95:'⛈️' };
    const icon = icons[code] || '🌡️';
    const city = data.timezone?.split('/')[1] || '';
    document.getElementById('weatherBar').innerHTML = `<span class="weather-icon">${icon}</span> ${temp}°C ${city}`;
  } catch(e) {
    document.getElementById('weatherBar').textContent = '🌤️ Weather unavailable';
  }
}
fetchWeather();

// ===== Daily Quote =====
const quotes = [
  '"The only way to do great work is to love what you do." — Steve Jobs',
  '"It does not matter how slowly you go as long as you do not stop." — Confucius',
  '"The future belongs to those who believe in the beauty of their dreams." — Eleanor Roosevelt',
  '"Strive not to be a success, but rather to be of value." — Albert Einstein',
  '"The best time to plant a tree was 20 years ago. The second best time is now." — Chinese Proverb',
  '"Your time is limited, don\'t waste it living someone else\'s life." — Steve Jobs',
  '"Everything you\'ve ever wanted is on the other side of fear." — George Addair',
  '"The only impossible journey is the one you never begin." — Tony Robbins',
  '"Do what you can, with what you have, where you are." — Theodore Roosevelt',
  '"Success is not final, failure is not fatal: it is the courage to continue that counts." — Winston Churchill',
  '"Act as if what you do makes a difference. It does." — William James',
  '"What lies behind us and what lies before us are tiny matters compared to what lies within us." — Emerson',
  '"The secret of getting ahead is getting started." — Mark Twain',
  '"Don\'t watch the clock; do what it does. Keep going." — Sam Levenson',
  '"Quality is not an act, it is a habit." — Aristotle',
];
const today = new Date().toDateString();
const idx = today.split('').reduce((a,c) => a + c.charCodeAt(0), 0) % quotes.length;
document.getElementById('quoteText').textContent = quotes[idx];

// ===== Search =====
function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const engine = document.getElementById('searchEngine').value;
  window.location.href = engine + encodeURIComponent(q);
}

// ===== Todo =====
function loadTodos() {
  try { return JSON.parse(localStorage.getItem('db_todos') || '[]'); } catch(e) { return []; }
}
function saveTodos(todos) { localStorage.setItem('db_todos', JSON.stringify(todos)); }
function renderTodos() {
  const todos = loadTodos();
  const list = document.getElementById('todoList');
  list.innerHTML = todos.map((t, i) => `
    <li class="todo-item ${t.done ? 'done' : ''}" onclick="toggleTodo(${i})">
      <span class="todo-check">${t.done ? '✓' : ''}</span> ${t.text}
    </li>
  `).join('');
}
function addTodo() {
  const input = document.getElementById('todoInput');
  const text = input.value.trim();
  if (!text) return;
  const todos = loadTodos();
  todos.push({ text, done: false });
  saveTodos(todos);
  input.value = '';
  renderTodos();
}
function toggleTodo(i) {
  const todos = loadTodos();
  todos[i].done = !todos[i].done;
  saveTodos(todos);
  renderTodos();
}
renderTodos();

// ===== Quick Links =====
function renderLinks() {
  const raw = localStorage.getItem('db_links');
  if (!raw) {
    localStorage.setItem('db_links', 
      'https://github.com|GitHub,https://news.ycombinator.com|HN,https://www.reddit.com|Reddit,https://twitter.com|X,https://www.youtube.com|YouTube');
  }
  const links = (localStorage.getItem('db_links') || '').split(',').filter(l => l.includes('|'));
  const container = document.getElementById('quickLinksContainer');
  container.innerHTML = links.map(l => {
    const [url, name] = l.split('|');
    return `<a href="${url.trim()}" class="quick-link" target="_blank">${name.trim()}</a>`;
  }).join('');
}
renderLinks();

// ===== Background =====
const bgImages = [
  'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80',
  'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1920&q=80',
  'https://images.unsplash.com/photo-1500964757637-c85e8a162699?w=1920&q=80',
  'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1920&q=80',
  'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1920&q=80',
  'https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=1920&q=80',
  'https://images.unsplash.com/photo-1439405326854-014607f694d7?w=1920&q=80',
  'https://images.unsplash.com/photo-1532274402911-5a369e4c4bb5?w=1920&q=80',
];
const bgIdx = new Date().getDate() % bgImages.length;
document.getElementById('bgImage').style.backgroundImage = `url(${bgImages[bgIdx]})`;
</script>
</body>
</html>
