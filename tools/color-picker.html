<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Picker - HEX RGB HSL Converter | Toolify</title>
  <meta name="description" content="Free online color picker and converter. Pick colors visually, convert between HEX, RGB, and HSL. One-click copy. Perfect for designers and developers.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://toolify.tools/tools/color-picker.html">
  <link rel="stylesheet" href="../css/style.css">
  <style>.cp{width:100%;height:120px;border-radius:var(--radius);border:2px solid var(--border);transition:background 0.2s}.sw{display:inline-block;width:32px;height:32px;border-radius:6px;border:1px solid #ddd;cursor:pointer;transition:transform 0.15s}.sw:hover{transform:scale(1.15)}.cr{display:flex;align-items:center;gap:8px;margin-bottom:8px}.cr label{min-width:50px;font-weight:600;font-size:0.85rem}.cr input{flex:1;font-family:'Courier New',monospace}</style>
</head>
<body>
<header class="header"><div class="header-inner">
  <a href="../index.html" class="logo"><div class="logo-icon">⚡</div>Toolify</a>
  <nav class="nav-links">
    <a href="../index.html">Home</a><a href="age-calculator.html">Age</a><a href="bmi-calculator.html">BMI</a><a href="password-generator.html">Password</a><a href="word-counter.html">Word</a>
  </nav>
</div></header>

<main class="tool-page">
  <nav class="breadcrumb"><a href="../index.html">Home</a> <span>/</span> <span>Color Picker</span></nav>
  <h1>Color Picker & Converter</h1>
  <p class="subtitle">Pick colors and convert between HEX, RGB, and HSL. One-click copy to clipboard.</p>
  <div class="ad-placeholder">[ AdSense Ad - 728x90 ]</div>

  <div class="tool-card-main">
    <div class="cp" id="cpv" style="background:#6366f1"></div>
    <div style="margin:20px 0;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <input type="color" id="np" value="#6366f1" oninput="sc('#np')" style="width:60px;height:44px;border:none;cursor:pointer;padding:0;border-radius:var(--radius-sm)">
      <span style="font-size:0.85rem;color:var(--text-secondary)">Presets:</span>
      <div style="display:flex;gap:6px;flex-wrap:wrap" id="ps"></div>
    </div>
    <div style="background:var(--bg-secondary);padding:20px;border-radius:var(--radius)">
      <div class="cr"><label>HEX</label><input type="text" id="hex" value="#6366f1" oninput="sc('#hex')" maxlength="7"><button class="btn btn-sm btn-secondary" onclick="cpy('hex')">Copy</button></div>
      <div class="cr"><label>RGB</label><input type="text" id="rgb" readonly><button class="btn btn-sm btn-secondary" onclick="cpy('rgb')">Copy</button></div>
      <div class="cr"><label>HSL</label><input type="text" id="hsl" readonly><button class="btn btn-sm btn-secondary" onclick="cpy('hsl')">Copy</button></div>
    </div>
  </div>
  <div class="ad-placeholder">[ AdSense Ad - 300x250 ]</div>
</main>

<footer class="footer"><div class="footer-links"><a href="../index.html">Home</a><a href="#">Privacy</a><a href="#">Terms</a></div><p>&copy; 2025 Toolify</p></footer>

<script>
const pre=['#6366f1','#ef4444','#10b981','#f59e0b','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316','#84cc16','#06b6d4','#000','#fff'];
document.getElementById('ps').innerHTML=pre.map(c=>`<span class="sw" style="background:${c};${c==='#fff'?'border:1px solid #ccc':''}" title="${c}" onclick="setC('${c}')"></span>`).join('');

function h2r(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}
function r2h(r,g,b){r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;if(mx===mn)h=s=0;else{const d=mx-mn;s=l>0.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break}}return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)}}

function setC(hex){
  const{r,g,b}=h2r(hex),{h,s,l}=r2h(r,g,b);
  document.getElementById('hex').value=hex;document.getElementById('rgb').value=`rgb(${r}, ${g}, ${b})`;document.getElementById('hsl').value=`hsl(${h}, ${s}%, ${l}%)`;
  document.getElementById('cpv').style.background=hex;document.getElementById('np').value=hex;
}

function sc(src){
  if(src==='#hex'){let h=document.getElementById('hex').value.trim();if(h.match(/^[0-9a-fA-F]{6}$/))h='#'+h;if(h.match(/^#[0-9a-fA-F]{6}$/))setC(h.toLowerCase())}
  else setC(document.getElementById('np').value);
}

function cpy(id){const e=document.getElementById(id);e.select();navigator.clipboard?.writeText(e.value);document.execCommand('copy')}

setC('#6366f1');
</script>
</body>
</html>
